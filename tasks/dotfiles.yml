- name: Cloning .dotfiles
  ansible.builtin.git:
    repo: 'git@github.com:Kristmh/dotfiles'
    dest: "{{ lookup('env', 'HOME') }}/dotfiles"
    recursive: yes
    update: yes
    accept_hostkey: yes
    version: master
  tags:
    - install
    - dotfiles
    - stow
- name: Stow dotfiles
  shell: cd $HOME/dotfiles && ./arch
  tags:
    - install
    - dotfiles
    - stow
